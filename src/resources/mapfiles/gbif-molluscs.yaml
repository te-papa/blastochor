- label: core
  reference_column: null
  primary_endpoint: object
  explode: null
  reduce: null
  requires:
    - path: identification.i.toTaxon.higherClassification
      condition_type: contains
      match: mollusca
  extend:
    - endpoint: object
      path: id
      for_label: identification, multimedia
    - endpoint: fieldcollection
      path: evidenceFor.atEvent.id
      for_label: null
    - endpoint: taxon
      path: identification.i.toTaxon.id
      for_label: null
    - endpoint: agent
      path: evidenceFor.atEvent.recordedBy.i.id, identification.i.identifiedBy.id
      for_label: null
  fields:
    - occurrenceID:
      - literal:
          path: pid
    - type:
      - literal:
          path: additionalType.i
    - created:
      - literal:
          path: _meta.created
    - modified:
      - literal:
          path: _meta.modified
    - language:
      - hardcoded:
          value: en
    - license:
      - hardcoded:
          value: Creative Commons Attribution 4.0 International license (CC BY 4.0)
    - rightsHolder:
      - literal:
          path: rightsHolder
    - accessRights:
      - literal:
          path: accessRights
    - references:
      - format_string:
          string: https://collections.tepapa.govt.nz/object/{}
          path: id
    - institutionID:
      - hardcoded:
          value: https://scientific-collections.gbif.org/institution/2749cf1e-60d9-4b03-9c71-3763632b8f78
    - collectionID:
      - hardcoded:
          value: https://scientific-collections.gbif.org/collection/a47ff076-1ea9-4790-8867-f0014e015a1a
    - datasetID:
      - hardcoded:
          value: tepapa:collection/dataset/molluscs
    - institutionCode:
      - hardcoded:
          value: NMNZ
    - collectionCode:
      - hardcoded:
          value: M.
    - datasetName:
      - hardcoded:
          value: Mollusc collection at Museum of New Zealand Te Papa Tongarewa
    - ownerInstitutionCode:
      - hardcoded:
          value: NMNZ
    - basisOfRecord:
      - literal:
          path: basisOfRecord
    - informationWithheld:
      - literal:
          path: informationWithheld
    - dataGeneralizations:
      - literal:
          path: dataGeneralizations
    - catalogNumber:
      - literal:
          path: identifier
    - recordNumber:
      - conditional:
          path: previousIdentifier.i.identifier
          condition_path: previousIdentifier.i.notes
          match: Collector's number|Collector number|Collector(s) number|collector number
    - recordedBy:
      - collate_list:
          path: evidenceFor.atEvent.recordedBy.i.title
    - recordedByID:
      - collate_list:
          path: evidenceFor.atEvent.recordedBy.i.id
      - for_each:
        - lookup:
            endpoint: agent
        - conditional:
            path: related.i.contentUrl
            condition_path: related.i.title
            match: ORCID
            fallback_match: Wikidata
    - sex:
      - literal:
          path: sex
    - lifeStage:
      - literal:
          path: lifeStage
    - occurrenceStatus:
      - hardcoded:
          value: present
    - eventID:
      - literal:
          path: evidenceFor.atEvent.pid
    - fieldNumber:
      - literal:
          path: evidenceFor.atEvent.id
      - lookup:
          endpoint: fieldcollection
      - literal:
          path: fieldNumber
    - eventDate:
      - literal:
          path: evidenceFor.atEvent.eventDate
    - verbatimEventDate:
      - literal:
          path: evidenceFor.atEvent.verbatimEventDate
    - samplingProtocol:
      - literal:
          path: evidenceFor.atEvent.id
      - lookup:
          endpoint: fieldcollection
      - literal:
          path: samplingProtocol
    - country:
      - literal:
          path: evidenceFor.atEvent.atLocation.country
    - countryCode:
      - country_code:
          path: evidenceFor.atEvent.atLocation.country
    - stateProvince:
      - literal:
          path: evidenceFor.atEvent.atLocation.stateProvince
    - locality:
      - continue_if:
          predicate: equals
          value: false
          functions:
            - literal:
                path: informationWithheld
      - literal:
          path: evidenceFor.atEvent.atLocation.locality
    - verbatimElevation:
      - literal:
          path: evidenceFor.atEvent.id
      - lookup:
          endpoint: fieldcollection
      - literal:
          path: atLocation.verbatimElevation
    - minimumElevationInMeters:
      - literal:
          path: evidenceFor.atEvent.id
      - lookup:
          endpoint: fieldcollection
      - compare_numbers:
          path_one: atLocation.minimumElevationInMeters
          path_two: atLocation.maximumElevationInMeters
          use: lower
    - maximumElevationInMeters:
      - literal:
          path: evidenceFor.atEvent.id
      - lookup:
          endpoint: fieldcollection
      - compare_numbers:
          path_one: atLocation.minimumElevationInMeters
          path_two: atLocation.maximumElevationInMeters
          use: higher
    - verbatimDepth:
      - literal:
          path: evidenceFor.atEvent.id
      - lookup:
          endpoint: fieldcollection
      - literal:
          path: atLocation.verbatimDepth
    - minimumDepthInMeters:
      - literal:
          path: evidenceFor.atEvent.id
      - lookup:
          endpoint: fieldcollection
      - compare_numbers:
          path_one: atLocation.minimumDepthInMeters
          path_two: atLocation.maximumDepthInMeters
          use: lower
    - maximumDepthInMeters:
      - literal:
          path: evidenceFor.atEvent.id
      - lookup:
          endpoint: fieldcollection
      - compare_numbers:
          path_one: atLocation.minimumDepthInMeters
          path_two: atLocation.maximumDepthInMeters
          use: higher
    - decimalLatitude:
      - continue_if:
          predicate: equals
          value: false
          functions:
            - literal:
                path: informationWithheld
      - literal:
          path: evidenceFor.atEvent.atLocation.mappingCentroid.lat
    - decimalLongitude:
      - continue_if:
          predicate: equals
          value: false
          functions:
            - literal:
                path: informationWithheld
      - literal:
          path: evidenceFor.atEvent.atLocation.mappingCentroid.lon
    - coordinateUncertaintyInMeters:
      - continue_if:
          predicate: equals
          value: false
          functions:
            - literal:
                path: informationWithheld
      - literal:
          path: evidenceFor.atEvent.id
      - lookup:
          endpoint: fieldcollection
      - measure_geodistance:
          units: m
    - geodeticDatum:
      - continue_if:
          predicate: equals
          value: false
          functions:
            - literal:
                path: informationWithheld
      - literal:
          path: evidenceFor.atEvent.id
      - lookup:
          endpoint: fieldcollection
      - literal:
          path: atLocation.mappingDetails.i.geodeticDatum
    - georeferenceSources:
      - literal:
          path: evidenceFor.atEvent.id
      - lookup:
          endpoint: fieldcollection
      - literal:
          path: atLocation.georeferenceSources
    - identificationID:
      - format_string:
          string: tepapa:collection/identification/{}/{}
          path: parent_id, identification.i.toTaxon.id
    - verbatimIdentification:
      - literal:
          path: identification.i.qualifiedName
    - typeStatus:
      - continue_if:
          predicate: not_in
          value: " ("
          functions:
            - literal:
                path: identification.i.typeStatus
      - literal:
          path: identification.i.typeStatus
    - identifiedBy:
      - literal:
          path: identification.i.identifiedBy.title
    - identifiedByID:
      - literal:
          path: identification.i.identifiedBy.id
      - lookup:
          endpoint: agent
      - conditional:
          path: related.i.contentUrl
          condition_path: related.i.title
          match: ORCID
          fallback_match: Wikidata
    - dateIdentified:
      - literal:
          path: identification.i.dateIdentified
    - scientificName:
      - literal:
          path: identification.i.toTaxon.scientificName
    - taxonRank:
      - literal:
          path: identification.i.toTaxon.rank
    - scientificNameAuthorship:
      - literal:
          path: identification.i.toTaxon.id
      - lookup:
          endpoint: taxon
      - literal:
          path: scientificNameAuthorshipSummary
    - higherClassification:
      - literal:
          path: identification.i.toTaxon.higherClassification
    - family:
      - literal:
          path: identification.i.toTaxon.family
    - subfamily:
      - literal:
          path: identification.i.toTaxon.subfamily
    - genus:
      - literal:
          path: identification.i.toTaxon.genus
    - subgenus:
      - literal:
          path: identification.i.toTaxon.subgenus
    - specificEpithet:
      - literal:
          path: identification.i.toTaxon.species
    - infraspecificEpithet:
      - literal:
          path: identification.i.toTaxon.id
      - lookup:
          endpoint: taxon
      - literal:
          path: subspecies
    - vernacularName:
      - literal:
          path: identification.i
      - collate_list:
          path: toTaxon.vernacularName.i.title
    - nomenclaturalCode:
      - literal:
          path: identification.i.toTaxon.id
      - lookup:
          endpoint: taxon
      - literal:
          path: nomenclaturalCode

